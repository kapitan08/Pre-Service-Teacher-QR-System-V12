<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05091a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.10);
            --glass-hover: rgba(255, 255, 255, 0.08);
            --accent: #3b8ef3;
            --accent-2: #8b5cf6;
            --accent-glow: rgba(59, 142, 243, 0.35);
            --text-main: #f0f4ff;
            --text-dim: #94a3b8;
            --text-muted: #4a5a7a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
            position: relative;

            /* Dark navy background matching the portal */
            background:
                radial-gradient(ellipse 60% 50% at 20% 80%, rgba(20, 60, 140, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 20%, rgba(59, 100, 200, 0.25) 0%, transparent 60%),
                radial-gradient(ellipse 80% 80% at 50% 100%, rgba(10, 20, 60, 0.9) 0%, transparent 70%),
                linear-gradient(160deg, #05091a 0%, #0a1228 40%, #0d1535 70%, #080c1a 100%);
        }

        /* Animated background orbs */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -20%;
            width: 70%;
            height: 70%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 142, 243, 0.08) 0%, transparent 70%);
            animation: floatOrb 8s ease-in-out infinite alternate;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -20%;
            width: 60%;
            height: 60%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.07) 0%, transparent 70%);
            animation: floatOrb 10s ease-in-out infinite alternate-reverse;
            pointer-events: none;
        }
        @keyframes floatOrb {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(5%, 5%) scale(1.1); }
        }

        /* Grid dots overlay */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* Card */
        .container {
            position: relative;
            z-index: 1;
            background: rgba(10, 18, 40, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 48px 40px 40px;
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            box-shadow:
                0 32px 80px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255,255,255,0.04) inset,
                0 1px 0 rgba(255,255,255,0.08) inset;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        /* Top glow line */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent-2), transparent);
            border-radius: 0 0 4px 4px;
        }

        /* Logo */
        .logo-container {
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
        }
        .logo-ring {
            position: relative;
            width: 96px;
            height: 96px;
        }
        .logo-ring::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            opacity: 0.6;
            animation: spinRing 4s linear infinite;
        }
        .logo-ring::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, transparent 40%, var(--accent));
            opacity: 0.4;
            animation: spinRing 4s linear infinite reverse;
        }
        @keyframes spinRing {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        .logo {
            position: relative;
            z-index: 1;
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(10, 18, 40, 0.9);
            box-shadow:
                0 0 0 1px rgba(59, 142, 243, 0.3),
                0 0 30px rgba(59, 142, 243, 0.3),
                0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }
        .logo:hover { transform: scale(1.05); }

        /* Fallback icon if image fails */
        .logo-fallback {
            position: relative;
            z-index: 1;
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(59,142,243,0.2), rgba(139,92,246,0.2));
            border: 2px solid rgba(59,142,243,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(59,142,243,0.2);
        }
        .logo-fallback svg { width: 44px; height: 44px; }

        /* Headings */
        h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.8px;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #f0f4ff 30%, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: var(--text-dim);
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 36px;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .subtitle::before, .subtitle::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
            max-width: 40px;
        }

        /* Input fields */
        .input-group {
            position: relative;
            margin-bottom: 14px;
        }
        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            pointer-events: none;
            transition: color 0.2s;
        }
        .input-icon svg { width: 16px; height: 16px; stroke-width: 1.8; }
        .input-group:focus-within .input-icon { color: var(--accent); }

        input {
            width: 100%;
            padding: 14px 20px 14px 46px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        input::placeholder { color: var(--text-muted); }
        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.45);
            box-shadow: 0 0 0 3px rgba(59, 142, 243, 0.12);
        }

        /* Password toggle */
        .input-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 4px;
            border-radius: 6px;
            transition: color 0.2s;
        }
        .input-toggle:hover { color: var(--text-dim); }
        .input-toggle svg { width: 16px; height: 16px; stroke-width: 1.8; }

        /* Login button */
        .login-btn {
            width: 100%;
            padding: 15px;
            margin-top: 8px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            background: linear-gradient(135deg, #3b8ef3, #2563eb);
            color: white;
            box-shadow:
                0 4px 16px rgba(59, 142, 243, 0.35),
                inset 0 1px 0 rgba(255,255,255,0.15);
            transition: all 0.22s cubic-bezier(.4,0,.2,1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-btn svg { width: 16px; height: 16px; stroke-width: 2; }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(59, 142, 243, 0.5);
            filter: brightness(1.08);
        }
        .login-btn:active { transform: translateY(0); }

        /* Footer */
        .footer-note {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .footer-note div:first-child {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 0.3px;
        }
        .footer-note div:last-child {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: rgba(59, 142, 243, 0.5);
            animation: floatParticle linear infinite;
        }
        @keyframes floatParticle {
            0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.5; }
            100% { transform: translateY(-20px) translateX(var(--drift)); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Background grid -->
    <div class="grid-overlay"></div>

    <!-- Floating particles -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Circular Logo -->
        <div class="logo-container">
            <div class="logo-ring">
                <img src="C:\Users\ADMIN\OneDrive\Desktop\Qr system\btvted logo.jpg"
                     alt="Attendance Portal Logo"
                     class="logo"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                <!-- Fallback SVG if image doesn't load -->
                <div class="logo-fallback" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="1.5">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
            </div>
        </div>

        <h1>Attendance Portal</h1>
        <p class="subtitle">Teachers System V12</p>

        <!-- Username -->
        <div class="input-group">
            <div class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
            <input type="text" id="username" placeholder="Username" autocomplete="username">
        </div>

        <!-- Password -->
        <div class="input-group">
            <div class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="3" y="11" width="18" height="11" rx="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <input type="password" id="password" placeholder="Password" autocomplete="current-password">
            <button class="input-toggle" onclick="togglePassword()" title="Show/hide password" type="button">
                <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </button>
        </div>

        <button class="login-btn" onclick="login()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                <polyline points="10 17 15 12 10 7"/>
                <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            LOGIN
        </button>

        <div class="footer-note">
            <div>© 2026 Cristian Faith Atienza</div>
            <div>Developer</div>
        </div>
    </div>

    <script>
        // ── LOGIN LOGIC (unchanged) ──
        function login() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!username || !password) {
                alert("Please enter both username and password.");
                return;
            }

            // Teacher Login
            if (username === "Teacher" && password === "1234") {
                localStorage.setItem("role", "teacher");
                localStorage.setItem("loggedIn", "true");
                window.location.href = "teacher.html";
            } else {
                alert("Access Denied: Invalid Credentials.");
            }
        }

        // Press Enter to login
        document.addEventListener("keypress", function(e) {
            if (e.key === "Enter") login();
        });

        // ── PASSWORD TOGGLE ──
        let pwVisible = false;
        function togglePassword() {
            const input = document.getElementById("password");
            const icon  = document.getElementById("eyeIcon");
            pwVisible = !pwVisible;
            input.type = pwVisible ? "text" : "password";
            icon.innerHTML = pwVisible
                ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                   <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                   <line x1="1" y1="1" x2="23" y2="23"/>`
                : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                   <circle cx="12" cy="12" r="3"/>`;
        }

        // ── FLOATING PARTICLES ──
        (function spawnParticles() {
            const container = document.getElementById('particles');
            const count = 18;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 2 + 1;
                p.style.cssText = `
                    left: ${Math.random() * 100}%;
                    width: ${size}px;
                    height: ${size}px;
                    opacity: ${Math.random() * 0.5 + 0.1};
                    --drift: ${(Math.random() - 0.5) * 80}px;
                    animation-duration: ${Math.random() * 12 + 8}s;
                    animation-delay: ${Math.random() * -15}s;
                    background: ${Math.random() > 0.5
                        ? 'rgba(59,142,243,0.6)'
                        : 'rgba(139,92,246,0.5)'};
                `;
                container.appendChild(p);
            }
        })();
    </script>
</body>
</html>
